@if (isElectron) {
  <div class="titlebar" role="banner">
    <div class="titlebar-drag">
      <span class="titlebar-title">AI Voice Reminder</span>
    </div>
    <div class="titlebar-controls">
      <button class="ctrl-btn minimize" (click)="minimize()" title="Minimize">
        <svg viewBox="0 0 10 2"><rect width="10" height="1.5" y="0.25"/></svg>
      </button>
      <button class="ctrl-btn maximize" (click)="maximize()" title="Maximize">
        <svg viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button class="ctrl-btn close" (click)="close()" title="Close">
        <svg viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>
      </button>
    </div>
  </div>
}
