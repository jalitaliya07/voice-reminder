@if (alertService.isVisible() && alertService.activeAlert(); as reminder) {
  <div class="notification-overlay animate-fade-in">
    <div class="notification-card animate-fade-in-up">

      <!-- Pulse icon -->
      <div class="notification-icon animate-pulse-ring">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>

      <!-- Content -->
      <div class="notification-content">
        <p class="notification-label">Reminder</p>
        <h3 class="notification-title">{{ reminder.title }}</h3>
        @if (reminder.description) {
          <p class="notification-desc">{{ reminder.description }}</p>
        }
        <p class="notification-time">{{ reminder.time }}</p>
      </div>

      <!-- Actions -->
      <div class="notification-actions">
        <button class="btn-primary" (click)="complete()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
          Done
        </button>
        <button class="btn-ghost" (click)="snooze()">Snooze 10m</button>
        <button class="btn-icon" (click)="dismiss()" title="Dismiss">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

    </div>
  </div>
}
